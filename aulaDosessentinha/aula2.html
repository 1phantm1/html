<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula do sessentinha 2</title>
    <link rel="stylesheet" href="a2.css">
</head>
<body>
    <h1>Tags</h1>
    <div class="tags">
        
        <p>Isso é um parágrafo</p>
        <hr>
        <!--hr = linha horizontal (horizontal row)-->
        <ul>
            <li>Isso</li>
            <li>É</li>
            <li>uma
            <li>lista
            <!--lista funciona com ou sem tag de fechamento "</>"-->
        </ul>
        <hr>
        <marquee><mark>vtnc</mark></marquee>
        <!--Inútil e feio (os dois), mas é elemento, ent foda-se-->
        <strong>Esse é um texto em negrito</strong><br>
        <hr>
        <!--br = break row (quebra de linha)-->
        <i>Esse é um texto itálico</i>

    </div>
</body>
</html>
